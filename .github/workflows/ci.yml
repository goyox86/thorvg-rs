name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # Vendored (static, compiled-from-source) build across OSes: Linux and
  # Windows on Intel x86_64, macOS on Apple Silicon (GitHub has retired the
  # free Intel macos-13 runners).
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive # thorvg + picolibc
      # build.rs drives bindgen, which calls libclang directly.
      - name: Install libclang (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y llvm-dev libclang-dev clang
      - name: Point bindgen at libclang (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: echo "LIBCLANG_PATH=C:\Program Files\LLVM\bin" >> $env:GITHUB_ENV
      # macOS: libclang ships with the Xcode command-line tools.
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --all-targets
      - run: cargo test --workspace --doc

  features:
    name: features (${{ matrix.features }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # `vendored` must stay on: without it build.rs falls back to a
        # system ThorVG via pkg-config, which is absent on the runner.
        features:
          - "vendored,std"
          - "vendored,std,svg,png,lottie,fonts,expressions"
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install libclang
        run: sudo apt-get update && sudo apt-get install -y llvm-dev libclang-dev clang
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo check -p thorvg --no-default-features --features "${{ matrix.features }}"

  # The non-vendored path: link against a system ThorVG shared library via
  # pkg-config instead of compiling the vendored sources. Needs a real
  # libthorvg.so built with the C API (-Dbindings=capi) so the tvg_* symbols
  # exist to link against.
  # Non-vendored path across Intel/x86_64 Unix OSes: link a system ThorVG
  # shared library via pkg-config instead of compiling the vendored sources.
  # Needs a real lib built with the C API (-Dbindings=capi) so the tvg_*
  # symbols exist to link against. Windows is excluded: pkg-config-based
  # system linking is a Unix convention (Windows uses the vendored build).
  system-lib:
    name: system lib (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest] # Linux x86_64 + macOS Apple Silicon
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive # capi header (bindgen) + meson sources
      - name: Install build deps (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y llvm-dev libclang-dev clang meson ninja-build pkg-config
      - name: Install build deps (macOS)
        if: runner.os == 'macOS'
        run: brew install meson ninja pkg-config
      # Default meson prefix (/usr/local) puts the pkgconfig file at
      # /usr/local/lib/pkgconfig on both OSes.
      - name: Build & install system thorvg (shared, C API)
        run: |
          meson setup /tmp/tvg thorvg-sys/thorvg \
            --buildtype=release \
            -Dbindings=capi -Dengines=cpu \
            -Dloaders="svg, png, lottie, ttf, otf" \
            -Dthreads=true -Dfile=true -Dextra=lottie_exp
          sudo meson install -C /tmp/tvg
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build against the shared library
        env:
          PKG_CONFIG_PATH: /usr/local/lib/pkgconfig
        run: >
          cargo build -p thorvg
          --no-default-features
          --features std,lottie,svg,png,fonts,expressions,threads,file-io

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install libclang
        run: sudo apt-get update && sudo apt-get install -y llvm-dev libclang-dev clang
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  examples:
    name: examples
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install libclang
        run: sudo apt-get update && sudo apt-get install -y llvm-dev libclang-dev clang
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build -p thorvg --examples

  docs:
    name: docs
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: -D warnings # fail on broken intra-doc links
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install libclang
        run: sudo apt-get update && sudo apt-get install -y llvm-dev libclang-dev clang
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Only the safe crate is gated: thorvg-sys's bindgen-generated docs
      # carry Doxygen `@param[in]`/`[out]` comments that rustdoc reads as
      # broken intra-doc links, which can't be fixed at the source.
      - run: cargo doc -p thorvg --no-deps
