name: Bare-metal

# Exercises the no_std + picolibc path in build.rs by cross-compiling for
# a bare-metal RISC-V target. The ESP32-C6 / Xtensa path needs the esp
# toolchain (export-esp.sh) and is validated locally, not here.

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - "thorvg-sys/**"
      - "thorvg/**"
      - ".github/workflows/bare-metal.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  riscv-none:
    name: riscv32imac-unknown-none-elf
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive # thorvg + picolibc
      - name: Install libclang + RISC-V bare-metal GCC (multilib)
        run: |
          sudo apt-get update
          sudo apt-get install -y llvm-dev libclang-dev clang gcc-riscv64-unknown-elf
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: riscv32imac-unknown-none-elf
      - uses: Swatinem/rust-cache@v2
      # std-gated features (std, threads, file-io) stay off on bare metal.
      - run: >
          cargo build -p thorvg
          --target riscv32imac-unknown-none-elf
          --no-default-features
          --features vendored,lottie,svg,png,fonts
